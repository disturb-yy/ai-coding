# ============================================================
# go-workflow Skill 映射配置
# 将此文件复制到项目根目录: .agent/workflow-skills.yaml
# ============================================================
#
# 三级优先级: 用户显式指定 > 本文件 > Skill 内置默认
# 如不需要自定义，删除此文件即可使用内置默认映射。
#
# ============================================================

# --- 术语配置 ---
terminology:
  # 代码结构分析工具名称（不配置则使用通用名）
  # 可选值: CodeMap, codegraph, go-codemap
  code_structure_tool: ""  # 留空则使用通用名"代码结构工具"，设置为 CodeMap/codegraph/go-codemap 则使用对应平台名称

# --- SubAgent Skill 绑定 ---
subagents:

  # Observe 阶段：读取项目索引文件
  doc-index-reader:
    # 默认: go-index
    skills:
      - go-index      # 解析 INDEX.md、ARCHITECTURE.md 等索引文件
    # 可选：传递额外上下文（如项目特定的文档路径）
    # extra_docs:
    #   - docs/design.md
    #   - specs/current/plan.md

  # Orient 阶段：通过代码结构工具查询模块结构
  code-structure-analyzer:
    # 默认: 无（代码结构工具是 MCP API，无需额外 Skill）
    skills: []
    # 可选：模块查询优先级
    # module_priority: [core, api, infra]

  # Draft 阶段：读取源码并生成补丁
  module-code-analyzer:
    # 默认: go-coding
    skills:
      - go-coding      # Go 编码规范 + build/vet/test 自纠正循环
      - go-diagnose  # 编译错误、测试失败、panic 诊断

  # Evaluate 阶段：运行测试
  test-runner:
    # 默认: go-diagnose
    skills:
      - go-ut-generate # 生成utskill
      - go-diagnose    # 测试失败根因分析，flaky test 识别
    expected_coverage: 80%  # 期望测试覆盖率，低于此值会触发警告
# --- 工作流行为选项 ---
options:

  # 单文件任务是否跳过 Orient 阶段
  # 开启后：单文件 bugfix/feature 直接从 Observe 跳到 Decide
  skip_structure_analysis_for_single_file: false

  # Evaluate 阶段输出级别
  # minimal: 仅 log_analysis JSON + 日志文件路径（推荐日常使用）
  # standard: + Mermaid 流程图 + 关键指标仪表盘（默认）
  # full: 全部 6 种可视化图表（仅复杂任务：跨模块/多迭代/重构）

  # Draft 阶段最大并发 SubAgent 数
  # 增大可加速跨模块任务，但增加上下文碎片化风险
  max_parallel_agents: 3
  output_detail: standard  # minimal | standard | full

  # 最大工作流迭代次数（Observe → Evaluate 完整循环）
  # 超过此次数后即使未完成也终止并报告
  max_iterations: 5

  # 是否在 Evaluate 阶段自动生成 log_analysis
  enable_log_analysis: true

  # 日志级别: minimal | standard | verbose
  # minimal: 仅必须日志（5项）
  # standard: 必须 + 重要日志（10项）
  # verbose: 全部日志（含可选）
  log_level: standard
